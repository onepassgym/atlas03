services:

  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: atlas06-api
    restart: unless-stopped
    ports:
      - "8747:8747"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/atlas06
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [ opg ]
    command: node src/server.js
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8747/health', r => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/atlas06
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [ opg ]
    command: node src/queue/worker.js
    # Phase 9: 3 worker replicas — each picks up batch-scrape jobs independently
    # Each worker can run CONCURRENCY=3 batch jobs × PAGE_POOL=6 tabs
    # Budget: 3 replicas × 2 GB = 6 GB for scraping
    deploy:
      replicas: 3
      resources:
        limits:
          memory: 2G

  # Phase 5: Dedicated media download + resize worker (no Chromium)
  media-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/atlas06
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - MEDIA_WORKER_CONCURRENCY=8
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [ opg ]
    command: node src/queue/mediaWorker.js
    deploy:
      resources:
        limits:
          memory: 512M

  mongo:
    image: mongo:7.0
    container_name: atlas06-mongo
    restart: unless-stopped
    ports:
      - "27328:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ opg ]

  redis:
    image: redis:7.2-alpine
    container_name: atlas06-redis
    restart: unless-stopped
    ports:
      - "6847:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ opg ]

volumes:
  mongo_data:
  redis_data:


networks:
  opg:
    driver: bridge
