services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas06-api
    restart: unless-stopped
    ports:
      - "8747:8747"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/atlas06
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dashboard/dist
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [ opg ]
    # Detect NODE_ENV. If production, run standard node. If dev, run with --watch for hot-reloading.
    command: >
      sh -c "if [ \"$$NODE_ENV\" = \"production\" ]; then 
               node src/server.js; 
             else 
               node --watch src/server.js; 
             fi"
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: [ "CMD", "node", "-e", "require('http').get('http://localhost:8747/health', r => process.exit(r.statusCode === 200 ? 0 : 1))" ]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/atlas06
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=${NODE_ENV:-production}
    volumes:
      - .:/app
      - /app/node_modules
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [ opg ]
    command: >
      sh -c "if [ \"$$NODE_ENV\" = \"production\" ]; then 
               node src/queue/worker.js; 
             else 
               node --watch src/queue/worker.js; 
             fi"
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G

  enrichment-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/atlas06
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=${NODE_ENV:-production}
      - ENRICHMENT_DELAY=3000
      - ENRICHMENT_BATCH_SIZE=10
    volumes:
      - .:/app
      - /app/node_modules
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [ opg ]
    command: >
      sh -c "if [ \"$$NODE_ENV\" = \"production\" ]; then 
               node src/queue/enrichmentWorker.js; 
             else 
               node --watch src/queue/enrichmentWorker.js; 
             fi"
    deploy:
      resources:
        limits:
          memory: 1G

  media-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/atlas06
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=${NODE_ENV:-production}
      - MEDIA_WORKER_CONCURRENCY=8
    volumes:
      - .:/app
      - /app/node_modules
      - ./media:/app/media
      - ./logs:/app/logs
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [ opg ]
    command: node src/queue/mediaWorker.js
    deploy:
      resources:
        limits:
          memory: 512M

  mongo:
    image: mongo:7.0
    container_name: atlas06-mongo
    restart: unless-stopped
    ports:
      - "27328:27017"
    volumes:
      - mongo_data:/data/db
    command: mongod --wiredTigerCacheSizeGB 1
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ opg ]

  redis:
    image: redis:7.2-alpine
    container_name: atlas06-redis
    restart: unless-stopped
    ports:
      - "6847:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning --maxmemory 200mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ opg ]

  dashboard:
    image: node:20-slim
    container_name: atlas06-dashboard
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - VITE_API_URL=http://api:8747
    command: sh -c "if [ \"$$NODE_ENV\" = \"production\" ]; then echo 'Dashboard built-in API'; else npm install && npm run dev -- --host; fi"
    networks: [ opg ]

volumes:
  mongo_data:
  redis_data:

networks:
  opg:
    driver: bridge
