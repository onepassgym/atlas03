
<svg width="140" height="36" viewBox="0 0 140 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Mathematical gradient based on golden ratio -->
    <linearGradient id="wordmark-gradient" x1="0" y1="0" x2="140" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1" />
      <stop offset="0.618" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Network path gradient -->
    <linearGradient id="network-gradient" x1="0" y1="18" x2="140" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.3" />
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.8" />
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- Data pulse -->
    <radialGradient id="pulse-glow">
      <stop offset="0" stop-color="#fff" />
      <stop offset="0.618" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#6366f1" />
    </radialGradient>
  </defs>
  
  <!-- Background network grid (crawler path visualization) -->
  <g id="background-network" opacity="0.06">
    <!-- Horizontal scan lines at φ-based intervals -->
    <line x1="0" y1="11.16" x2="140" y2="11.16" stroke="white" stroke-width="0.5" />
    <line x1="0" y1="18" x2="140" y2="18" stroke="white" stroke-width="0.5" />
    <line x1="0" y1="24.84" x2="140" y2="24.84" stroke="white" stroke-width="0.5" />
  </g>
  
  <!-- Crawler path trace (connecting all letters) -->
  <path d="M 12 8 L 22 18 L 32 8 L 50 18 L 70 8 L 90 18 L 110 8 L 128 18" 
        stroke="url(#network-gradient)" 
        stroke-width="1" 
        stroke-dasharray="2 3" 
        fill="none" 
        opacity="0.4" />
  
  <!-- Letter A (First) - Geometric Triangle Construction -->
  <!-- Mathematical properties: Isosceles triangle with 70.9° base angles -->
  <!-- Golden ratio height-to-base: h = 1.618 × base_half -->
  <g id="letter-a-1" transform="translate(0, 0)">
    <!-- Left stroke: 109.1° from horizontal (180° - 70.9°) -->
    <!-- Creates golden triangle proportion -->
    <path d="M 12 4 L 3 28" 
          stroke="white" 
          stroke-width="3" 
          stroke-linecap="round" 
          fill="none" />
    
    <!-- Right stroke: 70.9° from horizontal -->
    <!-- Mirror of left stroke maintaining symmetry -->
    <path d="M 12 4 L 21 28" 
          stroke="white" 
          stroke-width="3" 
          stroke-linecap="round" 
          fill="none" 
          opacity="0.75" />
    
    <!-- Crossbar at golden ratio from top: 0.618 × 24 = 14.83 from apex -->
    <!-- Horizontal (0° angle) for stability -->
    <line x1="7" y1="18.83" x2="17" y2="18.83" 
          stroke="white" 
          stroke-width="2.5" 
          stroke-linecap="round" />
    
    <!-- Network node at apex (crawler entry point) -->
    <circle cx="12" cy="4" r="2" fill="white" opacity="0.9" />
    <circle cx="12" cy="4" r="0.8" fill="#6366f1" />
  </g>
  
  <!-- Letter T - Orthogonal Geometry (90° angles) -->
  <!-- Based on perfect right angles and φ proportions -->
  <g id="letter-t" transform="translate(24, 0)">
    <!-- Horizontal crossbar: 0° angle, width = 13 units -->
    <!-- Centered on vertical axis for perfect balance -->
    <rect x="4" y="4" width="14" height="3" rx="1.5" fill="white" />
    
    <!-- Vertical stem: 90° from horizontal (perfectly vertical) -->
    <!-- Width = 3 units (Fibonacci number) -->
    <!-- Slight taper: top width 3, bottom width 2.5 (ratio = 1.2) -->
    <path d="M 9.5 7 L 12.5 7 L 12 28 L 10 28 Z" fill="white" opacity="0.8" />
    
    <!-- Network node at intersection (crawler decision point) -->
    <circle cx="11" cy="5.5" r="1.5" fill="#a78bfa" />
    <circle cx="11" cy="5.5" r="0.6" fill="white" />
  </g>
  
  <!-- Letter L - Right Angle Construction (90° corner) -->
  <!-- Demonstrates orthogonal path crawling -->
  <g id="letter-l" transform="translate(42, 0)">
    <!-- Vertical stroke: 90° from horizontal -->
    <!-- Height = 24 units (Fibonacci sequence: 8+13+3) -->
    <rect x="3" y="4" width="3" height="24" rx="1.5" fill="white" />
    
    <!-- Horizontal base: 0° angle, length = 13 units (Fibonacci) -->
    <!-- Creates perfect L shape with 90° internal angle -->
    <rect x="3" y="25" width="15" height="3" rx="1.5" fill="white" opacity="0.8" />
    
    <!-- Corner junction node (90° turn indicator) -->
    <circle cx="4.5" cy="26.5" r="2" fill="white" opacity="0.3" />
    <circle cx="4.5" cy="26.5" r="1" fill="#8b5cf6" />
  </g>
  
  <!-- Letter A (Second) - Mirror of First with Network Connection -->
  <!-- Same geometric properties as first A (70.9° base angles) -->
  <g id="letter-a-2" transform="translate(60, 0)">
    <!-- Left stroke: 109.1° from horizontal -->
    <path d="M 12 4 L 3 28" 
          stroke="white" 
          stroke-width="3" 
          stroke-linecap="round" 
          fill="none" />
    
    <!-- Right stroke: 70.9° from horizontal -->
    <path d="M 12 4 L 21 28" 
          stroke="white" 
          stroke-width="3" 
          stroke-linecap="round" 
          fill="none" 
          opacity="0.75" />
    
    <!-- Crossbar at golden ratio: 14.83 from apex -->
    <line x1="7" y1="18.83" x2="17" y2="18.83" 
          stroke="white" 
          stroke-width="2.5" 
          stroke-linecap="round" />
    
    <!-- Pentagon network overlay (crawler depth indicator) -->
    <!-- 5 nodes at 72° intervals (360°/5) -->
    <g opacity="0.2">
      <circle cx="12" cy="10" r="1" fill="white" />
      <circle cx="16.4" cy="13.2" r="1" fill="white" />
      <circle cx="14.5" cy="18.5" r="1" fill="white" />
      <circle cx="9.5" cy="18.5" r="1" fill="white" />
      <circle cx="7.6" cy="13.2" r="1" fill="white" />
    </g>
    
    <!-- Central crawler hub -->
    <circle cx="12" cy="14" r="2.5" fill="url(#pulse-glow)" opacity="0.8" />
    <circle cx="12" cy="14" r="1.2" fill="white" />
  </g>
  
  <!-- Letter S - Serpentine Path (Mathematical Curve) -->
  <!-- Based on Bézier curves with control points at golden ratios -->
  <g id="letter-s" transform="translate(84, 0)">
    <!-- Upper curve: convex arc (control points create 45° tangent entry/exit) -->
    <!-- Mathematical curve: cubic Bézier with φ-based control points -->
    <!-- Entry angle: 135°, Exit angle: 315° (creating S-curve flow) -->
    <path d="M 3 6 
             C 3 4, 13 4, 13 8
             C 13 12, 3 12, 3 16
             C 3 20, 13 20, 13 24
             C 13 28, 3 28, 3 26" 
          stroke="white" 
          stroke-width="3" 
          stroke-linecap="round" 
          fill="none" />
    
    <!-- Simplified geometric S (alternative mathematical approach) -->
    <!-- Top hook: 90° angle corners -->
    <path d="M 15 4 L 19 4 L 19 10 L 17 10 L 17 6 L 15 6 Z" 
          fill="white" 
          opacity="0.3" />
    
    <!-- Bottom hook: 90° angle corners (mirrored) -->
    <path d="M 15 22 L 17 22 L 17 26 L 19 26 L 19 28 L 15 28 Z" 
          fill="white" 
          opacity="0.3" />
    
    <!-- Center connection nodes (inflection points) -->
    <circle cx="8" cy="10" r="1.2" fill="#8b5cf6" />
    <circle cx="8" cy="22" r="1.2" fill="#8b5cf6" />
  </g>
  
  <!-- Network topology overlay (showing letter connections) -->
  <g id="network-connections" opacity="0.15">
    <!-- Inter-letter connections (crawler path between nodes) -->
    <line x1="21" y1="16" x2="24" y2="16" stroke="white" stroke-width="1" />
    <line x1="42" y1="16" x2="60" y2="16" stroke="white" stroke-width="1" />
    <line x1="81" y1="16" x2="84" y2="16" stroke="white" stroke-width="1" />
    
    <!-- Vertical scan indicators -->
    <circle cx="12" cy="28" r="1" fill="white" />
    <circle cx="72" cy="28" r="1" fill="white" />
  </g>
  
  <!-- Mathematical notation (subtle) -->
  <!-- Graph theory indicator: G = (V, E) where V = vertices, E = edges -->
  <g id="math-notation" opacity="0.1">
    <text x="125" y="34" font-family="serif" font-size="5" fill="white">G(V,E)</text>
  </g>
  
  <!-- Baseline alignment (horizontal reference at 0°) -->
  <line x1="3" y1="30" x2="137" y2="30" stroke="white" stroke-width="0.5" stroke-opacity="0.1" />
  
  <!-- Scanning depth indicators (crawler levels) -->
  <g id="depth-indicators" opacity="0.08">
    <rect x="0" y="0" width="2" height="36" fill="url(#wordmark-gradient)" />
    <rect x="138" y="0" width="2" height="36" fill="url(#wordmark-gradient)" />
  </g>
</svg>
