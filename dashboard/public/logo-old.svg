<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brand-grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="shine-grad" x1="0" y1="0" x2="24" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.3" />
      <stop offset="1" stop-color="white" stop-opacity="0.0" />
    </linearGradient>
  </defs>
  
  <g id="icon">
    <!-- Base block with theme violet -->
    <rect width="48" height="48" rx="14" fill="url(#brand-grad)" />
    <rect width="48" height="48" rx="14" fill="url(#shine-grad)" />
    
    <!-- Atlas Navigational "Globe / Grid" Rings -->
    <circle cx="24" cy="24" r="15" stroke="white" stroke-width="1.5" stroke-opacity="0.15" />
    <circle cx="24" cy="24" r="9" stroke="white" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="2 3" />
    
    <!-- Geometric 'A' (Origami Ribbons) representing Atlas -->
    <!-- Right Wing background -->
    <path d="M24 10 L35 32 H28 L21 18 Z" fill="white" fill-opacity="0.5" />
    <!-- Left Wing foreground -->
    <path d="M24 10 L13 32 H20 L27 18 Z" fill="white" />
    
    <!-- Central Data Core -->
    <circle cx="24" cy="26" r="3" fill="#7c3aed" />
    <circle cx="24" cy="26" r="1.5" fill="white" />

    <!-- OPG Signature Frost Element / Base Line -->
    <rect x="15" y="36" width="18" height="3" rx="1.5" fill="white" fill-opacity="0.25" />

    <!-- Outer Shine Border -->
    <rect x="0.5" y="0.5" width="47" height="47" rx="13.5" stroke="white" stroke-opacity="0.2" />
  </g>
</svg>
